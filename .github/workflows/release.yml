name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: STLHub-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: STLHub-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: STLHub-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: STLHub-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Clean
        run: dotnet clean src/STLHub/STLHub.csproj -c Release

      - name: Publish
        run: >
          dotnet publish src/STLHub/STLHub.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish/${{ matrix.artifact }}

      - name: Remove app config files from publish
        shell: bash
        run: |
          cd publish/${{ matrix.artifact }}
          rm -f *.db settings.json *.user *.env 2>/dev/null || true

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/${{ matrix.artifact }}/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C publish/${{ matrix.artifact }} .

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.version }}" `
            installer\STLHub.iss

      - name: Attest artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.zip

      - name: Attest installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: installer-output/STLHub-Setup-${{ steps.version.outputs.version }}.exe

      - name: Attest artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      - name: Upload installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: STLHub-installer
          path: installer-output/STLHub-Setup-*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/STLHub-Setup-*.exe
          fail_on_unmatched_files: true
